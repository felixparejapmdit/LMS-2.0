services:
  directus:
    container_name: lms-directus
    image: directus/directus:11.15.4
    user: "root" # FIX: Pinipilit ang container na magkaroon ng write access sa mounted volumes
    ports:
      - "8055:8055"
    volumes:
      - ./directus/database:/directus/database
      - ./directus/uploads:/directus/uploads
      - ./directus/extensions:/directus/extensions
    environment:
      KEY: "${DIRECTUS_KEY:-felix-lms-key}"
      SECRET: "${DIRECTUS_SECRET:-felix-lms-secret-32-chars-long-!!}"
      DB_CLIENT: "sqlite3"
      DB_FILENAME: "/directus/database/data.db"
      AUTH_PROVIDERS: "local"
      ADMIN_EMAIL: "${DIRECTUS_ADMIN_EMAIL:-admin@example.com}"
      ADMIN_PASSWORD: "${DIRECTUS_ADMIN_PASSWORD:-password}"
      CORS_ENABLED: "true"
      CORS_ORIGIN: "true"
      CORS_CREDENTIALS: "true"
      CORS_METHODS: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
      CORS_ALLOWED_HEADERS: "Content-Type,Authorization"
      PUBLIC_URL: "${DIRECTUS_PUBLIC_URL:-http://localhost:8055}"
      # WAL mode + Single instances = maximum SQLite stability
      DB_SQLITE_JOURNAL_MODE: "${SQLITE_JOURNAL_MODE:-WAL}"
      DB_SQLITE_BUSY_TIMEOUT: "30000"
      DB_SQLITE_SYNCHRONOUS: "OFF"
      NODE_OPTIONS: "--max-old-space-size=2048 --dns-result-order=ipv4first"
      PM2_INSTANCES: "1"
      TRUST_PROXY: "true"
      AUTH_SESSION_IP_TIE: "false"
      AUTH_SESSION_USER_AGENT_TIE: "false"
    command: >
      sh -c "npx directus bootstrap && npx directus start"
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:8055/server/ping', (res) => res.statusCode === 200 ? process.exit(0) : process.exit(1))" ]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped
    networks:
      lms-net:
        ipv4_address: 10.50.0.10

  backend:
    container_name: lms-backend
    user: "root" # FIX: Siguraduhin na ang backend ay makakasulat din sa shared data.db
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./directus/database:/directus/database
      - ./backend/uploads:/app/uploads
      - ./scripts:/app/scripts
    networks:
      - lms-net
    environment:
      PORT: "${BACKEND_PORT:-5000}"
      NODE_ENV: "${NODE_ENV:-production}"
      DB_PATH: "${DB_PATH:-/directus/database/data.db}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TELEGRAM_WEBHOOK_URL: "${TELEGRAM_WEBHOOK_URL}"
      # Use service name for internal communication (Docker DNS)
      DIRECTUS_INTERNAL_URL: "http://directus:8055"
      NODE_OPTIONS: "--dns-result-order=ipv4first"
      SQLITE_SQL_LOG_LEVEL: "warn"
      SQLITE_JOURNAL_MODE: "${SQLITE_JOURNAL_MODE:-WAL}"
      SQLITE_BUSY_TIMEOUT: "30000"
      SQLITE_SYNCHRONOUS: "OFF"
    depends_on:
      directus:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    container_name: lms-frontend
    build:
      context: ./react-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "${VITE_API_URL:-/api}"
        VITE_DIRECTUS_URL: "${VITE_DIRECTUS_URL:-/directus}"
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - lms-net
    depends_on:
      - backend
    restart: unless-stopped

networks:
  lms-net:
    driver: bridge
    name: lms_network
    ipam:
      config:
        - subnet: 10.50.0.0/16
