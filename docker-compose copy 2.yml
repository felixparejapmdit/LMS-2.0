services:
  directus:
    image: directus/directus:latest
    ports:
      - "8055:8055"
    volumes:
      - ./directus/database:/directus/database
      - ./directus/uploads:/directus/uploads
      - ./directus/extensions:/directus/extensions
    environment:
      KEY: "felix-lms-key"
      SECRET: "felix-lms-secret"
      DB_CLIENT: "sqlite3"
      DB_FILENAME: "/directus/database/data.db"
      ADMIN_EMAIL: "admin@example.com"
      ADMIN_PASSWORD: "password"
      CORS_ENABLED: "true"
      CORS_ORIGIN: "true"
      CORS_CREDENTIALS: "true"
      CORS_METHODS: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
      CORS_ALLOWED_HEADERS: "Content-Type,Authorization"
      PUBLIC_URL: "${VITE_DIRECTUS_URL:-http://localhost:8055}"
      # WAL can be unstable on Windows host mounts via Docker. 
      # On Proxmox (Linux), set DB_SQLITE_JOURNAL_MODE=WAL in your environment for speed.
      DB_SQLITE_JOURNAL_MODE: "${SQLITE_JOURNAL_MODE:-DELETE}"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./directus/database:/directus/database
      - ./backend/uploads:/app/uploads
    environment:
      PORT: 5000
      NODE_ENV: production
    depends_on:
      - directus
    restart: unless-stopped

  frontend:
    build:
      context: ./react-frontend
      dockerfile: Dockerfile
      args:
        # These are used DURING the docker build process.
        VITE_API_URL: "${VITE_API_URL:-http://localhost:5000/api}"
        VITE_DIRECTUS_URL: "${VITE_DIRECTUS_URL:-http://localhost:8055}"
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
